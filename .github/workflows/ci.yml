name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -- --ci --coverage

  build:
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: npm run lighthouse

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build -- --configuration=ci
      - run: npm run e2e
        env:
          CI: true

  deploy-preview:
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.event_name == 'pull_request' && needs.e2e.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - run: npx firebase deploy --only hosting --project tradedesk-e1956 --non-interactive

  deploy-prod:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Select Firebase auth method
        id: firebase-auth
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "method=token" >> "$GITHUB_OUTPUT"
          elif [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "method=service-account" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Add FIREBASE_TOKEN (run: firebase login:ci) or FIREBASE_SERVICE_ACCOUNT in GitHub repo secrets."
            exit 1
          fi
      - uses: google-github-actions/auth@v2
        if: steps.firebase-auth.outputs.method == 'service-account'
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          set -euo pipefail
          test -d dist/tradedesk/browser
          ARGS=(--only hosting,firestore:rules --project tradedesk-e1956 --non-interactive)
          if [ -n "$FIREBASE_TOKEN" ]; then
            npx firebase deploy "${ARGS[@]}" --token "$FIREBASE_TOKEN"
          else
            npx firebase deploy "${ARGS[@]}"
          fi
