<div class="shell">
  <header class="shell__header">
    <div class="shell__brand">
      <span class="shell__logo">TD</span>

        <h1 class="shell__title">TradeDesk</h1>
        <p class="shell__subtitle">Real-time trading terminal</p>
      </div>
    </div>
    <app-auth-status />

  <nav class="shell__nav" aria-label="Main navigation">
    <a
      class="shell__nav-link"

      routerLinkActive="shell__nav-link--active"

    <a
      class="shell__nav-link"

    </a>

    </a>

      Portfolio
    </a>
    <a class="shell__nav-link" routerLink="/charts" routerLinkActive="shell__nav-link--active">
      Charts
    </a>
    <a
      class="shell__nav-link"
      routerLink="/order-history"
      routerLinkActive="shell__nav-link--active"
    >
      Order History
    </a>

  <main class="shell__main">
